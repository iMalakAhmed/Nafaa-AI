name: Build RunPod Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - birth-certificate
    paths:
      - Dockerfile.runpod
      - runpod_handler.py
      - RUNPOD_ENDPOINTS.md
      - requirements.txt
      - requirements-yolo-ocr.txt
      - birthcert/**
      - casestudy/**
      - deploy/**
      - nationalid/**
      - printeddoc/**
      - .github/workflows/runpod-docker.yml

env:
  IMAGE_NAME: ghcr.io/imalakahmed/nafe3-doc-extraction

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RunPod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runpod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
